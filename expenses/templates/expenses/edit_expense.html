<form method="post">
    {% csrf_token %}

    <input type="date" name="date" value="{{ expense.date }}" required>

    <select name="category" required>
        {% for key, label in expense.CATEGORY_CHOICES %}
        <option value="{{ key }}" {% if expense.category == key %}selected{% endif %}>
            {{ label }}
        </option>
        {% endfor %}
    </select>

    <input type="text" name="description" value="{{ expense.description }}" required>
    <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" required>

    <select name="payment_mode" required>
        {% for key, label in expense.PAYMENT_MODE_CHOICES %}
        <option value="{{ key }}" {% if expense.payment_mode == key %}selected{% endif %}>
            {{ label }}
        </option>
        {% endfor %}
    </select>

    <button type="submit">Update</button>
</form>
