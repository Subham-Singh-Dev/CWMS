<style>
    input[type="date"], input[type="time"], input[type="datetime-local"] {
        color-scheme: light;
        color: #1a1a1a;
        background: #ffffff;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-family: inherit;
        font-size: 14px;
    }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
        filter: invert(0);
        cursor: pointer;
    }
</style>

<form method="post">
    {% csrf_token %}

    <input type="date" name="date" value="{{ expense.date }}" required>

    <select name="category" required>
        {% for key, label in expense.CATEGORY_CHOICES %}
        <option value="{{ key }}" {% if expense.category == key %}selected{% endif %}>
            {{ label }}
        </option>
        {% endfor %}
    </select>

    <input type="text" name="description" value="{{ expense.description }}" required>
    <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" required>

    <select name="payment_mode" required>
        {% for key, label in expense.PAYMENT_MODE_CHOICES %}
        <option value="{{ key }}" {% if expense.payment_mode == key %}selected{% endif %}>
            {{ label }}
        </option>
        {% endfor %}
    </select>

    <button type="submit">Update</button>
</form>
