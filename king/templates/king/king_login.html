{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Owner Access | CWMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --purple-600: #7c3aed;
            --neutral-50: #f8fafc;
            --neutral-200: #e2e8f0;
            --neutral-400: #94a3b8;
            --neutral-600: #475569;
            --neutral-900: #0f172a;
            --danger-50: #fef2f2;
            --danger-600: #dc2626;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--neutral-50);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px 36px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,.1), 0 8px 10px -6px rgba(0,0,0,.1);
            border: 1px solid var(--neutral-200);
        }
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-crown {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .brand-title {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary-600), var(--purple-600));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-subtitle {
            font-size: 13px;
            color: var(--neutral-400);
            margin-top: 6px;
            font-weight: 500;
        }
        .alert {
            background: var(--danger-50);
            color: var(--danger-600);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--neutral-600);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid var(--neutral-200);
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            color: var(--neutral-900);
            background: var(--neutral-50);
        }
        input:focus {
            outline: none;
            border-color: var(--primary-500);
            background: white;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary-600), var(--purple-600));
            color: white;
            margin-top: 8px;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .btn:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 8px 15px rgba(37,99,235,0.3);
        }
        .btn:active {
            transform: translateY(0);
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--neutral-400);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">

        <div class="brand">
            <span class="brand-crown">👑</span>
            <div class="brand-title">Owner Console</div>
            <div class="brand-subtitle">CWMS · Restricted Access</div>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter owner username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Access Owner Console</button>
        </form>

        <div class="footer">
            🔒 Encrypted · Authorized Personnel Only
        </div>
    </div>
</div>
<script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
