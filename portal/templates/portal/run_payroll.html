{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Run Payroll | {{ BRAND_SHORT_NAME }}</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            color: #1f2937;
            font-weight: 700;
        }

        p {
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }

        input[type="month"] {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            margin-bottom: 25px;
            box-sizing: border-box;
            font-family: inherit;
            font-weight: 600;
        }

        .btn-run {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-run:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 42px; margin-bottom: 12px;">💰</div>

    <h2>Run Payroll</h2>
    <p>Select a month to generate salaries for all active workers.</p>

    <form method="POST" action="{% url 'run_payroll' %}">

        {% csrf_token %}

        <input
            type="month"
            name="payroll_month"
            value="{{ today|date:'Y-m' }}"
            required
        >

        <button
            type="submit"
            class="btn-run"
            onclick="return confirm(
                'This will generate payroll for ALL active workers for the selected month.\n\nThis action should be done ONLY ONCE.\n\nDo you want to continue?'
            )"
        >
            🚀 Run Payroll Engine
        </button>
    </form>

    <a href="{% url 'manager_dashboard' %}" class="back-link">Cancel and return to dashboard</a>
</div>
<script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
